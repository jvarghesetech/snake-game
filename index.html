<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#060608;
  --border:rgba(255,255,255,0.06);
  --green:#00ff87;
  --green-glow:rgba(0,255,135,0.4);
  --orange:#ff6b35;
  --orange-glow:rgba(255,107,53,0.5);
  --white:#f0f0f0;
  --muted:rgba(240,240,240,0.35);
  --danger:#ff3b5c;
}

html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:'Space Grotesk',sans-serif;
  color:var(--white);
  user-select:none;
}

/* scanlines */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;z-index:100;
}

/* vignette */
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.85) 100%);
  pointer-events:none;z-index:99;
}

#app{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:14px;
  padding:16px;
}

/* ── header ── */
header{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:600px;
}

.wordmark{
  font-family:'Fira Code',monospace;
  font-size:0.7rem;
  letter-spacing:0.2em;
  color:var(--muted);
}
.wordmark span{color:var(--green);}

.stats{display:flex;gap:16px;}

.stat{text-align:right;}

.stat-label{
  font-family:'Fira Code',monospace;
  font-size:0.5rem;
  letter-spacing:0.15em;
  color:var(--muted);
  text-transform:uppercase;
}

.stat-value{
  font-family:'Fira Code',monospace;
  font-size:1rem;
  font-weight:500;
  color:var(--white);
  transition:color 0.15s, text-shadow 0.15s;
}

.stat-value.flash{
  color:var(--green);
  text-shadow:0 0 16px var(--green-glow);
}

/* ── canvas wrap ── */
#canvas-wrap{
  position:relative;
  flex-shrink:0;
  border-radius:6px;
  overflow:hidden;
  border:1px solid rgba(0,255,135,0.15);
  box-shadow:
    0 0 0 1px rgba(0,255,135,0.06),
    0 0 40px rgba(0,255,135,0.07),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

#game-canvas{
  display:block;
}

@keyframes shake{
  0%,100%{transform:translate(0,0)}
  15%{transform:translate(-5px,3px)}
  30%{transform:translate(4px,-3px)}
  45%{transform:translate(-3px,4px)}
  60%{transform:translate(3px,-2px)}
  75%{transform:translate(-2px,2px)}
}
#canvas-wrap.shake{animation:shake 0.4s ease both;}

/* ── overlay ── */
#overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  background:rgba(6,6,8,0.92);
  backdrop-filter:blur(6px);
  transition:opacity 0.25s;
}
#overlay.gone{opacity:0;pointer-events:none;}

.ol-eye{
  font-family:'Fira Code',monospace;
  font-size:0.55rem;
  letter-spacing:0.25em;
  color:var(--muted);
  margin-bottom:14px;
}

.ol-title{
  font-size:3rem;
  font-weight:700;
  letter-spacing:-0.04em;
  line-height:1;
  margin-bottom:6px;
}
.ol-title.green{color:var(--green);text-shadow:0 0 50px var(--green-glow),0 0 100px rgba(0,255,135,0.15);}
.ol-title.red{color:var(--danger);text-shadow:0 0 50px rgba(255,59,92,0.5);}

.ol-sub{
  font-family:'Fira Code',monospace;
  font-size:0.65rem;
  color:var(--muted);
  letter-spacing:0.08em;
  margin-bottom:32px;
  min-height:18px;
}
.ol-sub b{color:var(--white);}

#play-btn{
  background:transparent;
  border:1px solid var(--green);
  color:var(--green);
  font-family:'Fira Code',monospace;
  font-size:0.65rem;
  font-weight:500;
  letter-spacing:0.2em;
  text-transform:uppercase;
  padding:11px 30px;
  border-radius:2px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:color 0.2s, box-shadow 0.2s;
}
#play-btn::before{
  content:'';position:absolute;inset:0;
  background:var(--green);
  transform:translateX(-101%);
  transition:transform 0.2s ease;
}
#play-btn:hover{color:#000;box-shadow:0 0 24px var(--green-glow);}
#play-btn:hover::before{transform:translateX(0);}
#play-btn span{position:relative;z-index:1;}
#play-btn:active{transform:scale(0.97);}

/* combo */
#combo-pill{
  position:absolute;top:8px;right:8px;
  background:rgba(255,107,53,0.1);
  border:1px solid rgba(255,107,53,0.35);
  border-radius:999px;
  padding:3px 10px;
  font-family:'Fira Code',monospace;
  font-size:0.6rem;
  letter-spacing:0.08em;
  color:var(--orange);
  opacity:0;
  transform:scale(0.85) translateY(-4px);
  transition:opacity 0.2s, transform 0.2s;
  pointer-events:none;
}
#combo-pill.show{opacity:1;transform:scale(1) translateY(0);}

/* ── footer ── */
footer{
  width:100%;
  max-width:600px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.keys{display:flex;gap:6px;flex-wrap:wrap;}

.kbd{
  font-family:'Fira Code',monospace;
  font-size:0.5rem;
  letter-spacing:0.04em;
  color:var(--muted);
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:3px;
  padding:3px 7px;
}
.kbd b{color:rgba(255,255,255,0.5);}

#speed-wrap{display:flex;align-items:center;gap:8px;}
.dots{display:flex;gap:3px;}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--border);
  transition:background 0.3s, box-shadow 0.3s;
}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green-glow);}
.dot.warn{background:var(--orange);box-shadow:0 0 6px var(--orange-glow);}
#lvl-txt{
  font-family:'Fira Code',monospace;
  font-size:0.5rem;
  color:var(--muted);
  letter-spacing:0.1em;
  min-width:30px;
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="wordmark">// <span>snake</span>.exe</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">best</div>
        <div class="stat-value" id="best-val">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">score</div>
        <div class="stat-value" id="score-val">0</div>
      </div>
    </div>
  </header>

  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="combo-pill">🔥 x<span id="combo-num">2</span></div>
    <div id="overlay">
      <div class="ol-eye" id="ol-eye">ready when you are</div>
      <div class="ol-title green" id="ol-title">SNAKE</div>
      <div class="ol-sub" id="ol-sub">&nbsp;</div>
      <button id="play-btn"><span id="btn-txt">START GAME</span></button>
    </div>
  </div>

  <footer>
    <div class="keys">
      <div class="kbd"><b>WASD</b> move</div>
      <div class="kbd"><b>P</b> pause</div>
      <div class="kbd"><b>SPC</b> restart</div>
    </div>
    <div id="speed-wrap">
      <div class="dots" id="dots">
        <div class="dot on"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div id="lvl-txt">LVL 1</div>
    </div>
  </footer>

</div>
<script>
// ─── responsive sizing ───────────────────
const COLS=24, ROWS=24;
const HEADER_H=60, FOOTER_H=40, GAP=14*3, PADDING=32;

function calcCell(){
  const maxW = Math.min(window.innerWidth  - PADDING, 600);
  const maxH = window.innerHeight - HEADER_H - FOOTER_H - GAP - PADDING;
  const byW  = Math.floor(maxW / COLS);
  const byH  = Math.floor(maxH / ROWS);
  return Math.max(12, Math.min(byW, byH, 26));
}

let CELL = calcCell();
let W = COLS*CELL, H = ROWS*CELL;

const canvas = document.getElementById('game-canvas');
const wrap   = document.getElementById('canvas-wrap');
const ctx    = canvas.getContext('2d');

function resizeCanvas(){
  CELL = calcCell();
  W = COLS*CELL; H = ROWS*CELL;
  canvas.width  = W;
  canvas.height = H;
  wrap.style.width  = W+'px';
  wrap.style.height = H+'px';
}
resizeCanvas();
window.addEventListener('resize', ()=>{ resizeCanvas(); draw(); });

// ─── colors ──────────────────────────────
const C={
  bg:'#060608',
  grid:'rgba(255,255,255,0.022)',
  gridA:'rgba(255,255,255,0.05)',
  head:'#00ff87', headS:'#00cc6a',
  bodyE:'#00cc6a', bodyO:'#009f55',
  food:'#ff6b35', foodI:'#ffaa80',
  foodG:'rgba(255,107,53,0.55)',
  trail:'rgba(0,255,135,',
  parts:['#00ff87','#00cc6a','#7fff6b','#ffffff'],
  dparts:['#ff3b5c','#ff6b35','#ffffff'],
};

// ─── state ───────────────────────────────
let snake,dir,nextDir,food,score,best=0,state,timer;
let level=1,combo=0,particles=[],trail=[];
let fp=0,fa=0;

// ─── particles ───────────────────────────
class P{
  constructor(x,y,cols,burst){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*(burst?7:5);
    this.vy=(Math.random()-.5)*(burst?7:5)-(burst?3:2);
    this.life=1;
    this.decay=Math.random()*.04+(burst?.035:.025);
    this.r=Math.random()*3+(burst?2:1);
    this.color=cols[Math.floor(Math.random()*cols.length)];
    this.g=burst?.28:.14;
    this.sq=Math.random()>.5;
    this.a=Math.random()*Math.PI*2;
    this.spin=(Math.random()-.5)*.3;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.life-=this.decay;this.a+=this.spin;}
  draw(){
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);
    ctx.translate(this.x,this.y);ctx.rotate(this.a);
    ctx.fillStyle=this.color;
    if(this.sq) ctx.fillRect(-this.r,-this.r,this.r*2,this.r*2);
    else{ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
}

// ─── init ────────────────────────────────
function init(){
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my},{x:mx-3,y:my}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;combo=0;
  particles=[];trail=[];fp=0;fa=0;
  placeFood();
  hud();setCombo(0);dots();
}

function placeFood(){
  let p;
  do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y));
  food=p;
}

// ─── tick ────────────────────────────────
function tick(){
  if(state!=='running')return;

  trail.unshift({x:snake[0].x,y:snake[0].y,life:1});
  if(trail.length>7)trail.pop();

  dir={...nextDir};
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS){die();return;}
  if(snake.some(s=>s.x===h.x&&s.y===h.y)){die();return;}

  snake.unshift(h);

  if(h.x===food.x&&h.y===food.y){
    combo++;
    const pts=10*(combo>=3?Math.min(combo,6):1);
    score+=pts; if(score>best)best=score;
    // eat particles
    const cx=food.x*CELL+CELL/2,cy=food.y*CELL+CELL/2;
    for(let i=0;i<16;i++)particles.push(new P(cx,cy,C.parts,false));
    setCombo(combo);
    const nl=Math.min(Math.floor(score/50)+1,8);
    if(nl!==level){level=nl;resetTimer();}
    placeFood();hud();flash();
  } else {
    snake.pop();combo=0;setCombo(0);
  }
  draw();
}

function die(){
  state='dead';
  // death particles from each segment
  snake.forEach((s,i)=>{
    if(i%2!==0)return;
    const cx=s.x*CELL+CELL/2,cy=s.y*CELL+CELL/2;
    for(let j=0;j<4;j++)particles.push(new P(cx,cy,C.dparts,true));
  });
  shake();draw();
  setTimeout(()=>{
    showOl('GAME OVER','red',`score <b>${score}</b>  ·  best <b>${best}</b>`,'RETRY');
  },480);
}

function resetTimer(){
  clearInterval(timer);
  const ms=Math.max(60,115-(level-1)*8);
  timer=setInterval(tick,ms);
  dots();
}

// ─── draw ────────────────────────────────
let raf;
function loop(){raf=requestAnimationFrame(loop);if(state==='running'||state==='dead')draw();}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
  drawGrid();drawTrail();drawFood();drawSnake();drawParticles();
}

function drawGrid(){
  ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=CELL){
    ctx.strokeStyle=(x%(CELL*4)===0)?C.gridA:C.grid;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<=H;y+=CELL){
    ctx.strokeStyle=(y%(CELL*4)===0)?C.gridA:C.grid;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
}

function drawTrail(){
  trail.forEach(t=>{
    t.life-=0.16;
    if(t.life<=0)return;
    const cx=t.x*CELL+CELL/2,cy=t.y*CELL+CELL/2;
    ctx.fillStyle=C.trail+(t.life*.2)+')';
    ctx.beginPath();ctx.arc(cx,cy,(CELL/2-2)*t.life,0,Math.PI*2);ctx.fill();
  });
  trail=trail.filter(t=>t.life>0);
}

function drawFood(){
  fp+=0.07;fa+=0.045;
  const cx=food.x*CELL+CELL/2,cy=food.y*CELL+CELL/2;
  const r=CELL/2-1+Math.sin(fp)*2;
  // glow
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r+10);
  g.addColorStop(0,C.foodG);g.addColorStop(1,'rgba(255,107,53,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r+10,0,Math.PI*2);ctx.fill();
  // orbit dots
  for(let i=0;i<4;i++){
    const a=fa+i*Math.PI/2;
    ctx.fillStyle='rgba(255,107,53,0.5)';
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*(r+4),cy+Math.sin(a)*(r+4),2,0,Math.PI*2);ctx.fill();
  }
  // body
  ctx.shadowColor=C.food;ctx.shadowBlur=10;
  ctx.fillStyle=C.food;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // shine
  ctx.fillStyle=C.foodI;ctx.beginPath();ctx.arc(cx-r*.28,cy-r*.28,r*.32,0,Math.PI*2);ctx.fill();
}

function drawSnake(){
  const len=snake.length;
  for(let i=len-1;i>=0;i--){
    const s=snake[i];
    const x=s.x*CELL,y=s.y*CELL;
    if(i===0){
      ctx.shadowColor=C.head;ctx.shadowBlur=state==='dead'?0:12;
      ctx.fillStyle=state==='dead'?'#333':C.head;
      rr(x+1,y+1,CELL-2,CELL-2,6);ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle=C.headS;ctx.lineWidth=1;
      rr(x+1,y+1,CELL-2,CELL-2,6);ctx.stroke();
      drawEyes(s);
    } else {
      const t=i/(len-1);
      ctx.globalAlpha=Math.max(0.25,1-t*.6);
      ctx.fillStyle=state==='dead'?'#2a2a2a':(i%2===0?C.bodyE:C.bodyO);
      const pad=Math.min(3,1+Math.floor(t*3));
      rr(x+pad,y+pad,CELL-pad*2,CELL-pad*2,Math.max(2,5-Math.floor(t*2)));
      ctx.fill();ctx.globalAlpha=1;
    }
  }
}

function drawEyes(s){
  if(state==='dead'){
    const cx=s.x*CELL+CELL/2,cy=s.y*CELL+CELL/2;
    ctx.strokeStyle='#ff3b5c';ctx.lineWidth=1.5;ctx.lineCap='round';
    const r=2.5;
    [[cx-4,cy-3],[cx+4,cy-3]].forEach(([ex,ey])=>{
      ctx.beginPath();ctx.moveTo(ex-r,ey-r);ctx.lineTo(ex+r,ey+r);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+r,ey-r);ctx.lineTo(ex-r,ey+r);ctx.stroke();
    });return;
  }
  const d=dir;let e1,e2;
  const X=s.x*CELL,Y=s.y*CELL;
  if(d.x===1) {e1={x:X+13,y:Y+4}; e2={x:X+13,y:Y+12};}
  if(d.x===-1){e1={x:X+4, y:Y+4}; e2={x:X+4, y:Y+12};}
  if(d.y===-1){e1={x:X+4, y:Y+4}; e2={x:X+12,y:Y+4};}
  if(d.y===1) {e1={x:X+4, y:Y+13};e2={x:X+12,y:Y+13};}
  [e1,e2].forEach(e=>{
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(e.x,e.y,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(e.x+.6,e.y-.6,.85,0,Math.PI*2);ctx.fill();
  });
}

function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw();});
}

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── hud ─────────────────────────────────
function hud(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('best-val').textContent=best;
}
function flash(){
  const el=document.getElementById('score-val');
  el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),300);
}
function setCombo(n){
  combo=n;
  document.getElementById('combo-num').textContent=n;
  document.getElementById('combo-pill').classList.toggle('show',n>=3);
}
function dots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className='dot';
    if(i<level)d.classList.add(level>=6?'warn':'on');
  });
  document.getElementById('lvl-txt').textContent='LVL '+level;
}
function shake(){
  wrap.classList.add('shake');
  setTimeout(()=>wrap.classList.remove('shake'),420);
}

// ─── overlay ─────────────────────────────
function showOl(title,color,subHTML,btnLabel){
  const ol=document.getElementById('overlay');
  document.getElementById('ol-title').textContent=title;
  document.getElementById('ol-title').className='ol-title '+(color||'green');
  document.getElementById('ol-sub').innerHTML=subHTML||'&nbsp;';
  document.getElementById('btn-txt').textContent=btnLabel||'START GAME';
  document.getElementById('ol-eye').textContent=color==='red'?'try again?':'ready when you are';
  ol.classList.remove('gone');
}
function hideOl(){document.getElementById('overlay').classList.add('gone');}

// ─── start ───────────────────────────────
function startGame(){
  clearInterval(timer);init();hideOl();
  state='running';resetTimer();
}
document.getElementById('play-btn').addEventListener('click',startGame);

// ─── input ───────────────────────────────
const KM={
  ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},
  ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},
  ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0},
};
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(e.key===' '){if(state==='idle'||state==='dead')startGame();return;}
  if(e.key==='p'||e.key==='P'){
    if(state==='running'){state='paused';showOl('PAUSED','green','&nbsp;','RESUME');}
    else if(state==='paused'){state='running';hideOl();}
    return;
  }
  if(KM[e.key]&&(state==='running')){
    const nd=KM[e.key];
    if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;
  }
});

// touch
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(state==='idle'||state==='dead'){startGame();return;}
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){
    const nd=dx>0?{x:1,y:0}:{x:-1,y:0};
    if(nd.x!==-dir.x)nextDir=nd;
  } else {
    const nd=dy>0?{x:0,y:1}:{x:0,y:-1};
    if(nd.y!==-dir.y)nextDir=nd;
  }
},{passive:true});

// ─── boot ────────────────────────────────
state='idle';init();draw();loop();
</script>
</body>
</html>
